services:
  - type: web
    name: dog-training-ai-command-center
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOOKING_LINK
        value: https://calendly.com/your-dog-training-company/consultation
